<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grip&Rip Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root { --primary: #1e293b; --secondary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; color: var(--primary); }
        .admin-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select, button { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .btn { cursor: pointer; font-weight: bold; border: none; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { opacity: 0.9; }
        .btn-save { background: var(--secondary); color: white; }
        .btn-import { background: #f59e0b; color: white; }
        .btn-archive { background: #6366f1; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-move { background: #64748b; color: white; padding: 5px; font-size: 12px; height: 30px; width: 30px; }
        .btn-sort { background: #334155; color: white; width: auto; padding: 8px 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 11px; color: #64748b; padding: 8px; border-bottom: 2px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 8px; border-bottom: 1px solid #f1f5f9; }
        .division-header { background: #334155; color: white; padding: 12px; border-radius: 6px; margin-top: 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .action-cell { display: flex; gap: 4px; justify-content: center; }
        #fileInput { display: none; }
        input:focus { outline: 2px solid var(--secondary); background: #f0fdf4; }
    </style>
</head>
<body>

    <h1>Grip&Rip Admin</h1>

    <div class="admin-card">
        <h3>Current Event</h3>
        <div class="grid">
            <div><label>Venue</label><input type="text" id="venueName"></div>
            <div style="grid-column: span 2;"><label>Event Dates</label><input type="text" id="dateRange" placeholder="Select Date Range.."></div>
            <div><label>Season</label><input type="number" id="seasonNum"></div>
            <div><label>Week</label><input type="number" id="weekNum"></div>
        </div>
        <div style="display:flex; gap:15px;">
            <label><input type="checkbox" id="isSig" style="width:auto;"> Major 2x Pts</label>
            <label><input type="checkbox" id="doubleBonus" style="width:auto;"> Bonus 2x</label>
        </div>
    </div>

    <div class="admin-card">
        <h3>Quick Add Player</h3>
        <div class="grid">
            <input type="text" id="newName" placeholder="Name">
            <select id="newConsole"><option value="PS">PS</option><option value="Xbox">Xbox</option><option value="PC">PC</option></select>
            <select id="newDiv"><option value="1">Div 1</option><option value="2">Div 2</option><option value="3">Div 3</option><option value="0">Inactive</option></select>
            <button class="btn btn-save" onclick="addPlayer()"><i class="fa-solid fa-plus"></i> Add</button>
        </div>
    </div>

    <div id="division-container"></div>

    <div class="admin-card">
        <h3>Data Management</h3>
        <div class="grid">
            <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
            <button class="btn btn-import" onclick="document.getElementById('fileInput').click()"><i class="fa-solid fa-file-import"></i> 1. Import data.json</button>
            <button class="btn btn-archive" onclick="exportArchive()"><i class="fa-solid fa-box-archive"></i> 2. Finalize Week</button>
            <button class="btn btn-save" onclick="exportJSON()"><i class="fa-solid fa-download"></i> 3. Download data.json</button>
            <button class="btn btn-danger" onclick="clearScores()"><i class="fa-solid fa-eraser"></i> 4. Reset Weekly Scores</button>
        </div>
        <button class="btn btn-danger" onclick="clearSeasonStandings()"><i class="fa-solid fa-broom"></i> Reset Season Standings</button>
    </div>

    <template id="div-template">
        <div class="division-header">
            <span class="header-text">Division X</span>
            <button class="btn btn-sort" onclick="sortDivision(this)"><i class="fa-solid fa-arrow-down-9-1"></i> Sort Scores</button>
        </div>
        <div class="admin-card">
            <table class="div-table">
                <thead>
                    <tr>
                        <th>Player</th>
                        <th style="width:80px;">To Par</th>
                        <th style="width:70px;">Putt</th>
                        <th style="width:70px;">Shot</th>
                        <th style="width:70px;">Ace</th>
                        <th style="width:70px;">Alby</th>
                        <th style="width:90px;">S. ACC</th>
                        <th style="width:60px;">PTS</th> <th style="width:120px;">Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </template>
	
	<div class="admin-card">
		<h2><i class="fa-solid fa-ranking-star"></i> Season Standings (Preview)</h2>
		<div id="admin-standings-preview" class="grid" style="display: flex; flex-direction: column; gap: 20px;">
			</div>
	</div>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
    // 1. DATA INITIALIZATION
    let leagueData = JSON.parse(localStorage.getItem('golfAdminData')) || {
        venue: "", date: "", seasonNum: 1, weekNum: 1, isSig: false, doubleBonus: false,
        players: [], season: {}, historyHtml: "", lastFinalizedWeek: 0
    };

    let fp;

    function init() {
        document.getElementById('venueName').value = leagueData.venue || "";
        document.getElementById('seasonNum').value = leagueData.seasonNum || 1;
        document.getElementById('weekNum').value = leagueData.weekNum || 1;
        document.getElementById('isSig').checked = leagueData.isSig || false;
        document.getElementById('doubleBonus').checked = leagueData.doubleBonus || false;
        
        fp = flatpickr("#dateRange", {
            mode: "range",
            dateFormat: "Y-m-d",
            defaultDate: leagueData.date ? leagueData.date.split(" to ") : []
        });

        renderTables();
        setupNavigation();
    }

    // 2. RENDERING ENGINE (The Core Logic)
    function renderTables() {
        const container = document.getElementById('division-container');
        container.innerHTML = '';
        
        const currentWeekNum = parseInt(document.getElementById('weekNum').value);
        const isAlreadyFinalized = (leagueData.lastFinalizedWeek === currentWeekNum);

        // Render Entry Tables
        [1, 2, 3, 0].forEach(divNum => {
            const temp = document.getElementById('div-template').content.cloneNode(true);
            temp.querySelector('.header-text').innerText = divNum === 0 ? "Inactive" : "Division " + divNum;
            temp.querySelector('.btn-sort').setAttribute('data-div', divNum);
            const tbody = temp.querySelector('tbody');
            
            const players = leagueData.players
                .filter(p => p.division == divNum)
                .sort((a,b) => parseScore(a.toPar) - parseScore(b.toPar));
            
            let lastScore = null, tiedRank = 0;
            
            players.forEach((p, idx) => {
                const currentScore = parseScore(p.toPar);
                if (currentScore !== lastScore) tiedRank = idx;
                lastScore = currentScore;
                
                const tieCount = players.filter(pl => parseScore(pl.toPar) === currentScore && currentScore !== 999).length;
                const displayRank = (tieCount > 1 && divNum !== 0) ? "T" + (tiedRank + 1) : (idx + 1);
                
                // Calculate Points for the Weekly Column
                const weeklyPts = (p.toPar !== "" || p.putt !== "") ? calculatePoints(p, tiedRank) : 0;
                const currentAcc = leagueData.season[p.name]?.acc || "";

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><small style="color:#94a3b8">${displayRank}.</small> <strong>${p.name}</strong></td>
                    <td><input type="text" value="${p.toPar||''}" onchange="updatePlayerData('${p.name}','toPar',this.value)"></td>
                    <td><input type="number" value="${p.putt||''}" onchange="updatePlayerData('${p.name}','putt',this.value)"></td>
                    <td><input type="number" value="${p.shot||''}" onchange="updatePlayerData('${p.name}','shot',this.value)"></td>
                    <td><input type="text" value="${p.ace||''}" onchange="updatePlayerData('${p.name}','ace',this.value)"></td>
                    <td><input type="text" value="${p.alby||''}" onchange="updatePlayerData('${p.name}','alby',this.value)"></td>
                    <td><input type="text" value="${currentAcc}" placeholder="+/-" onchange="updateSeasonAcc('${p.name}', this.value)"></td>
                    <td style="text-align:center; font-weight:bold; color:#10b981;">${weeklyPts}</td>
                    <td class="action-cell">
                        <button class="btn btn-move" onclick="movePlayer('${p.name}',-1)"><i class="fa-solid fa-angle-up"></i></button>
                        <button class="btn btn-move" onclick="movePlayer('${p.name}',1)"><i class="fa-solid fa-angle-down"></i></button>
                        <button class="btn btn-danger" style="width:30px; height:30px; padding:0;" onclick="removePlayer('${p.name}')"><i class="fa-solid fa-xmark"></i></button>
                    </td>`;
                tbody.appendChild(row);
            });
            container.appendChild(temp);
        });

        // Render Season Standings (Projected)
		const standingsArea = document.getElementById('admin-standings-preview');
		standingsArea.innerHTML = ''; 

		[1, 2, 3].forEach(dv => {
			// 1. Get players and calculate their projected totals first
			let playersInDiv = leagueData.players
				.filter(p => p.division == dv)
				.map(p => {
					// Determine current week's rank to get weekly points
					const currentWeekPlayers = leagueData.players
						.filter(pl => pl.division == dv)
						.sort((a, b) => parseScore(a.toPar) - parseScore(b.toPar));
					
					const lastScoreP = null, tiedRankP = 0;
					// Find this specific player's rank in the sorted list
					const myRank = currentWeekPlayers.findIndex(pl => pl.name === p.name);
					
					// Handle ties for the rank calculation
					let myTiedRank = myRank;
					for(let i = 0; i <= myRank; i++) {
						if(parseScore(currentWeekPlayers[i].toPar) === parseScore(currentWeekPlayers[myRank].toPar)) {
							myTiedRank = i;
							break;
						}
					}

					const weeklyPts = (!isAlreadyFinalized && (p.toPar !== "" || p.putt !== "")) ? calculatePoints(p, myTiedRank) : 0;
					const hist = leagueData.season[p.name] || { points: 0, eventsPlayed: 0, wins: 0, acc: "E" };
					
					return {
						...p,
						projectedTotal: hist.points + weeklyPts,
						projectedEvents: weeklyPts > 0 ? hist.eventsPlayed + 1 : hist.eventsPlayed,
						weeklyPts: weeklyPts,
						history: hist,
						isWinning: (!isAlreadyFinalized && myTiedRank === 0 && (p.toPar !== "" || p.putt !== ""))
					};
				})
				// 2. SORT BY TOTAL POINTS (Highest to Lowest)
				.sort((a, b) => b.projectedTotal - a.projectedTotal);

			if (playersInDiv.length > 0) {
				let h = `<div style="background:#f1f5f9; padding:15px; border-radius:8px; margin-bottom:10px;">
							<h3 style="margin-top:0;">Division ${dv} (Ranked by Total Pts)</h3>
							<table style="width:100%; border-collapse:collapse; background:white;">
								<tr style="background:#e2e8f0;">
									<th style="text-align:left; padding:5px;">Player</th>
									<th style="text-align:center;">P</th>
									<th style="text-align:center;">W</th>
									<th style="text-align:center;">S. ACC</th>
									<th style="text-align:center;">WK PTS</th>
									<th style="text-align:center;">TOT PTS</th>
								</tr>`;

				playersInDiv.forEach(p => {
					const winDisplay = p.isWinning ? `${p.history.wins} <span style="color:#10b981;">+1</span>` : p.history.wins;

					h += `<tr style="border-bottom:1px solid #eee;">
							<td style="padding:5px;"><strong>${p.name}</strong></td>
							<td style="text-align:center;">${p.projectedEvents}</td>
							<td style="text-align:center;">${winDisplay}</td>
							<td style="text-align:center;">${p.history.acc}</td>
							<td style="text-align:center; color:#10b981;">+${p.weeklyPts}</td>
							<td style="text-align:center; font-weight:bold; background:#f8fafc;">${p.projectedTotal}</td>
						  </tr>`;
				});
				h += `</table></div>`;
				standingsArea.innerHTML += h;
			}
		});
        localStorage.setItem('golfAdminData', JSON.stringify(leagueData));
    }

    // 3. ACTION FUNCTIONS
    function exportArchive() {
        const vn = document.getElementById('venueName').value;
        const sn = document.getElementById('seasonNum').value;
        const wn = parseInt(document.getElementById('weekNum').value);
        const dr = formatExportDate(document.getElementById('dateRange').value); 
        
        if(!vn) return alert("Enter a Venue Name first!");
        if(leagueData.lastFinalizedWeek === wn) return alert("Week " + wn + " already finalized.");

        let html = `<div class="history-item"><strong>S${sn} W${wn}: ${vn} (${dr})</strong><table>`;
        
        [1,2,3].forEach(dv => {
            const players = leagueData.players.filter(p => p.division == dv).sort((a,b) => parseScore(a.toPar) - parseScore(b.toPar));
            if(players.length > 0) {
                html += `<tr><th colspan="3">Division ${dv}</th></tr>`;
                let lastScore = null, tiedRank = 0;
                players.forEach((p, idx) => {
                    const currentScore = parseScore(p.toPar);
                    if (currentScore !== lastScore) tiedRank = idx;
                    lastScore = currentScore;
                    
                    if(p.toPar !== "" || p.putt !== "") {
                        const pts = calculatePoints(p, tiedRank);
                        html += `<tr><td>${p.name}</td><td>${p.toPar}</td><td>${pts}</td></tr>`;
                        
                        leagueData.season[p.name] = leagueData.season[p.name] || {points:0, eventsPlayed:0, wins:0, acc:"E"};
                        leagueData.season[p.name].points += pts;
                        leagueData.season[p.name].eventsPlayed++;
                        if(tiedRank === 0) leagueData.season[p.name].wins++;
                        
                        let currentAcc = parseScore(leagueData.season[p.name].acc);
                        if(currentAcc === 999) currentAcc = 0;
                        let weeklyScore = parseScore(p.toPar);
                        if(weeklyScore !== 999) {
                            let newTotal = currentAcc + weeklyScore;
                            leagueData.season[p.name].acc = newTotal === 0 ? "E" : (newTotal > 0 ? "+" + newTotal : newTotal);
                        }
                    }
                });
            }
        });
        
        html += `</table></div>`;
        leagueData.historyHtml = html + (leagueData.historyHtml || "");
        leagueData.lastFinalizedWeek = wn;
        localStorage.setItem('golfAdminData', JSON.stringify(leagueData));
        alert("Week " + wn + " Finalized & History Archived.");
        renderTables();
    }

    function sortDivision(btn) {
        const dv = parseInt(btn.getAttribute('data-div'));
        leagueData.players.sort((a,b) => {
            if(a.division !== b.division) return 0;
            return a.division === dv ? parseScore(a.toPar) - parseScore(b.toPar) : 0;
        });
        localStorage.setItem('golfAdminData', JSON.stringify(leagueData));
        renderTables();
    }

    function updatePlayerData(name, field, value) {
		const p = leagueData.players.find(x => x.name === name);
		if (!p) return;

		let val = value.trim().toUpperCase();

		if (field === 'toPar' && val !== "") {
			let num = parseInt(val.replace("+", ""));
			if (!isNaN(num)) {
				if (num > 0) val = "+" + num;
				else if (num === 0) val = "E";
				else val = num.toString();
			} else if (val !== 'E') {
				val = ""; // Clear invalid junk
			}
		}

		p[field] = val;
		localStorage.setItem('golfAdminData', JSON.stringify(leagueData));
		
		// We render immediately to show the "+" or "E" formatting
		renderTables();
		
		// After re-render, we need to put focus back where it was
		// (Optional: adding a small delay or a 'data-ref' check helps)
	}

    function updateSeasonAcc(name, val) {
        if (!leagueData.season[name]) leagueData.season[name] = {points:0, eventsPlayed:0, wins:0, acc:""};
        leagueData.season[name].acc = val;
        localStorage.setItem('golfAdminData', JSON.stringify(leagueData));
    }

    // 4. UTILS
    function parseScore(v) { 
        if (!v || v === "") return 999;
        let s = v.toString().trim().toUpperCase();
        if (s === 'E' || s === '0') return 0;
        return parseInt(s.replace("+","")) || 0;
    }
    
    function calculatePoints(p, rank) {
		// 1st: 100, 2nd: 90, 3rd: 80, 4th: 70, 5th: 60, 6th: 50, 7th: 40, 8th: 30, 9th: 20, 10th+: 10
		let base = 100 - (rank * 10);
		
		// Ensure the lowest base points possible is 10
		if (base < 10) base = 10;
		
		let bM = document.getElementById('doubleBonus').checked ? 2 : 1;
		let bonus = 0;
		
		if(parseInt(p.putt) > 0) bonus += (25 * bM); 
		if(parseInt(p.shot) > 0) bonus += (25 * bM);
		if(p.ace && p.ace.trim() !== "") bonus += (50 * bM); 
		if(p.alby && p.alby.trim() !== "") bonus += (50 * bM);
		
		let total = base + bonus;
		
		// Check for Major (Signature) Event 2x multiplier
		return document.getElementById('isSig').checked ? total * 2 : total;
	}

    function formatExportDate(dateStr) {
        if (!dateStr || !dateStr.includes(" to ")) return dateStr;
        const parts = dateStr.split(" to ");
        const d1 = new Date(parts[0]);
        const d2 = new Date(parts[1]);
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        return `${d1.getDate()} ${months[d1.getMonth()]} - ${d2.getDate()} ${months[d2.getMonth()]} ${d2.getFullYear()}`;
    }

    function addPlayer() {
        const n = document.getElementById('newName').value.trim();
        if(!n) return;
        leagueData.players.push({name:n, console:document.getElementById('newConsole').value, division:parseInt(document.getElementById('newDiv').value), toPar:"", putt:"", shot:"", ace:"", alby:""});
        document.getElementById('newName').value = "";
        renderTables();
    }

    function movePlayer(name, dir) {
        const p = leagueData.players.find(x => x.name === name);
        if(!p) return;
        let cur = p.division === 0 ? 4 : p.division;
        let nxt = Math.max(1, Math.min(4, cur + dir));
        p.division = nxt === 4 ? 0 : nxt;
        renderTables();
    }

    function removePlayer(n) { if(confirm("Delete "+n+"?")) { leagueData.players=leagueData.players.filter(p=>p.name!==n); renderTables(); } }
    
    function exportJSON() {
		// Sync UI to data object
		leagueData.venue = document.getElementById('venueName').value;
		leagueData.seasonNum = parseInt(document.getElementById('seasonNum').value);
		leagueData.weekNum = parseInt(document.getElementById('weekNum').value);
		
		// Force the checkbox states into the JSON
		leagueData.isSig = document.getElementById('isSig').checked;
		leagueData.doubleBonus = document.getElementById('doubleBonus').checked;

		const blob = new Blob([JSON.stringify(leagueData, null, 2)], {type: "application/json"});
		const a = document.createElement('a');
		a.href = URL.createObjectURL(blob);
		a.download = `S${leagueData.seasonNum}W${leagueData.weekNum}_data.json`;
		a.click();
	}

		function importJSON(e) {
			const file = e.target.files[0];
			if(!file) return;
			const reader = new FileReader();
			reader.onload = (ev) => {
				try {
					leagueData = JSON.parse(ev.target.result);
					localStorage.setItem('golfAdminData', JSON.stringify(leagueData));
					init(); 
					alert("Data imported!");
				} catch (err) { alert("Invalid JSON"); }
			};
			reader.readAsText(file);
		}

    function clearScores() {
        if(confirm("Wipe weekly scores?")) {
            leagueData.players.forEach(p => { p.toPar=""; p.putt=""; p.shot=""; p.ace=""; p.alby=""; });
            renderTables();
        }
    }

    function clearSeasonStandings() { 
        if(confirm("Wipe everything?")) { 
            leagueData.season={}; leagueData.historyHtml=""; leagueData.lastFinalizedWeek=0; 
            localStorage.setItem('golfAdminData', JSON.stringify(leagueData)); 
            location.reload(); 
        } 
    }

    function setupNavigation() {
		// We attach to the container so it works even after tables re-render
		document.getElementById('division-container').addEventListener('keydown', function(e) {
			const active = document.activeElement;
			if (active.tagName !== 'INPUT') return;

			const cell = active.closest('td');
			const row = active.closest('tr');
			const colIdx = cell.cellIndex;
			const tbody = row.closest('tbody');

			if (e.key === "ArrowUp") {
				e.preventDefault();
				const prevRow = row.previousElementSibling;
				if (prevRow) prevRow.cells[colIdx].querySelector('input')?.focus();
			} 
			else if (e.key === "ArrowDown" || e.key === "Enter") {
				e.preventDefault();
				const nextRow = row.nextElementSibling;
				if (nextRow) {
					nextRow.cells[colIdx].querySelector('input')?.focus();
				} else {
					// If at end of division, try to find the first row of the next division
					const nextDiv = row.closest('.admin-card').parentElement.nextElementSibling;
					const nextInput = nextDiv?.querySelector('tbody tr td:nth-child(' + (colIdx + 1) + ') input');
					if (nextInput) nextInput.focus();
				}
			}
			else if (e.key === "ArrowLeft" && active.selectionStart === 0) {
				const prevInput = cell.previousElementSibling?.querySelector('input');
				if (prevInput) prevInput.focus();
			}
			else if (e.key === "ArrowRight" && active.selectionStart === active.value.length) {
				const nextInput = cell.nextElementSibling?.querySelector('input');
				if (nextInput) nextInput.focus();
			}
		});
	}

    window.onload = init;
</script>
</body>
</html>
